{{ $data := index site.Data "data" }}
<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <!-- Navbar brand -->
        <a class="navbar-brand nav-link" href="/">
            {{ with $data.index }}
            <img src="{{ .logo | relURL}}" height="28" alt="Gasthof Pension Spessartruh Steiger"
                loading="lazy" style="transform: scaleX(-1)"/>
                {{ end }}
        </a>
        <button class="navbar-toggler" type="button" data-mdb-toggle="collapse" data-mdb-target="#navbarExample01"
            aria-controls="navbarExample01" aria-expanded="false" aria-label="Toggle navigation" style="z-index: 2000;">
            <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarExample01">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                {{ $currentPage := . }}
                {{ range .Site.Menus.main.ByWeight }}
                {{ if lt .Weight 11 }}
                <li class="nav-item ">
                    <a class='nav-link {{ if in $currentPage .URL  }} active {{ end }}' href="{{ .URL }}">
                        {{ .Name }}
                    </a>
                </li>
                {{ end }}
                {{ end }}
            </ul>

            <ul class="navbar-nav list-inline">
                <!-- Icons -->
                <li class="">
                    <a class="nav-link" href="https://www.youtube.com/channel/UC5CF7mLQZhvx8O5GODZAhdA" rel="nofollow"
                        target="_blank">
                        <i class="fab fa-youtube"></i>
                    </a>
                </li>
                <li class="">
                    <a class="nav-link" href="https://www.facebook.com/mdbootstrap" rel="nofollow" target="_blank">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="https://twitter.com/MDBootstrap" rel="nofollow" target="_blank">
                        <i class="fab fa-twitter"></i>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="https://github.com/mdbootstrap/mdb-ui-kit" rel="nofollow" target="_blank">
                        <i class="fab fa-github"></i>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<!-- Navbar -->
