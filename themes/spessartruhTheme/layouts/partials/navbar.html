{{ $data := index site.Data "data" }}
<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <!-- Navbar brand -->
        <a class="navbar-brand nav-link text-black-50" href="/">
            {{ with $data.index }}
            <img src="{{ .logo_wide | relURL}}" height="28" alt="Gasthof Pension Spessartruh Steiger"
                loading="lazy"/>
                {{ end }}
        </a>
        <button class="navbar-toggler" type="button" data-mdb-toggle="collapse" data-mdb-target="#navbarExample01"
            aria-controls="navbarExample01" aria-expanded="false" aria-label="Toggle navigation" style="z-index: 2000;">
            <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarExample01">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                {{ $currentPage := . }}
                {{ range .Site.Menus.main.ByWeight }}
                {{ if lt .Weight 11 }}
                <li class="nav-item ">
                    <a class='nav-link  {{ if in $currentPage .URL  }} text-black {{ else }} text-black-50 {{ end }}' href="{{ .URL }}">
                        {{ .Name }}
                    </a>
                </li>
                {{ end }}
                {{ end }}
            </ul>

            <ul class="navbar-nav list-inline">
                <!-- Icons -->
                {{ with $data.social_media}}
                {{ range .items}}
                <li class="nav-item">
                    <a class="nav-link text-black-50" href="{{.url}}" rel="nofollow" target="_blank">
                        <i class="fab {{.item}}"></i>
                    </a>
                </li>
                {{ end }}
                {{ end }}
            </ul>
        </div>
    </div>
</nav>
<!-- Navbar -->
