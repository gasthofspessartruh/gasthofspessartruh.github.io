{{ define "main" }}
{{- partial "navbar.html" . -}}
{{ $lang_data := index site.Data site.Language.Lang}}

<main class="mt-5 mb-5">
  <div class="container">
    <div class="row d-flex justify-content-center align-items-center">
      <div class="col-xl-7 col-md-8">
        <div class="card">
          <!--Section: Content-->
          <iframe class="card-img-top"
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2564.794588442362!2d9.26232487776465!3d49.996460471509025!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47bd360b0ec77cdb%3A0x101146eafb62a1f9!2sGasthof%20Spessartruh%20Steiger!5e0!3m2!1sde!2sde!4v1687952629423!5m2!1sde!2sde"
            allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
            height="500"
            >
          </iframe>
          <div class="card-body">
            <h5 class="card-title">
              {{$lang_data.data.location.title}}
            </h5>
            <div class="card-text">
              {{$lang_data.data.location.text | markdownify}}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
{{ end }}
