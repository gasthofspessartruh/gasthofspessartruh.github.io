{{ define "main" }}
{{- partial "navbar.html" . -}}
{{ $lang_data := index site.Data site.Language.Lang}}

<main class="mt-5 mb-5">
  <div class="container">
    <div class="row d-flex justify-content-center align-items-center">
      <div class="col-xl-7 col-md-8">
        <div class="card border-0 shadow-sm">

          <!-- Map Embed -->
          <iframe 
            src="https://www.openstreetmap.org/export/embed.html?bbox=9.262941777706148%2C49.99580185017349%2C9.266798794269564%2C49.99719674112558&amp;layer=mapnik&amp;marker=49.996499300707775%2C9.264870285987854" 
            style="width:100%; height:500px; border:0; border-radius:0.5rem 0.5rem 0 0;" 
            allowfullscreen 
            loading="lazy" 
            referrerpolicy="strict-origin-when-cross-origin"
            sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox">
          </iframe>

          <div class="card-body rounded-0">
            <h5 class="card-title">
              {{$lang_data.data.location.title}}
            </h5>
            <div class="card-text">
              {{$lang_data.data.location.text | markdownify}}
            </div>

            <!-- Button group -->
            <div class="mt-3 d-flex gap-2">
              <a href="https://www.google.com/maps?client=safari&rls=en&oe=UTF-8&um=1&ie=UTF-8&fb=1&gl=us&sa=X&geocode=Kdt8xw4LNr1HMfmhYvvqRhEQ&daddr=Steiger+16,+63856+Bessenbach,+Deutschland" 
                 target="_blank" 
                 rel="noopener" 
                 class="btn btn-primary">
                <i class="bi bi-geo-alt-fill me-2"></i> {{$lang_data.data.location.gmaps}}
              </a>
              <a href="https://www.openstreetmap.org/?mlat=49.9964993&mlon=9.2648703#map=18/49.9965/9.2649" 
                 target="_blank" 
                 rel="noopener" 
                 class="btn btn-outline-secondary">
                <i class="bi bi-map me-2"></i>  {{$lang_data.data.location.osm}}
              </a>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</main>
{{ end }}
