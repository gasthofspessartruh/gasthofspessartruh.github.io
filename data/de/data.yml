index:
  welcome_title: "Willkommen im Landgasthof Spessartruh in Steiger"
  welcome_text: "Inmitten des Spessarts finden Sie ein traditionelles Wirtshaus mit blank gescheuerten Holztischen, gemütlichem Kachelofen und Panorama-Biergarten.  \n Freuen Sie sich auf regionale Küche mit deftigen Speisen. Vom Vesper bis hin zum saftigen Steak, über leckere Salate und Vegetarisches lässt die Speisekarte kaum Wünsche offen.  \n Vielleicht kosten Sie auch ein Glas von unserem „Äppelwoi“ oder genießen ein frisch gezapftes Bier aus der Region."
  cards_title: "Ein Gasthof zum Wohlfühlen"
  cards:
  - title: "Unser Biergarten"
    text: "Nehmen Sie Platz in unserem großen Biergarten! \n\n Es erwartet Sie ein einzigartiges Panorama, schattenspendende Walnussbäume und ein Kinderspielplatz."
    images:
    - name: "Clara, Mona und Frida"
      src: "/images/biergarten/Mona-Clara-und-Frida.jpeg"
  - title: "Feierlichkeiten"
    text: "Ob mit oder ohne Tischdecke, wir freuen uns Ihre nächste Feier zu begleiten. \n\n  Einfach telefonisch oder per Mail einen Termin zur Besprechung machen."
    images:
    - name: "Kommunion"
      src: "/images/feierlichkeiten/kommunion_gruen.jpeg"
    - name: "Hochzeit"
      src: "/images/feierlichkeiten/hochzeit.jpeg"
    - name: "Hochzeit"
      src: "/images/feierlichkeiten/Hochzeit-2.jpg"
  - title: "Steiger und Umgebung"
    text: " Der kleine Ort Steiger mit rund 80 Einwohnern, liegt auf einer Anhöhe ohne Durchgangsverkehr.  Die frische Spessartluft und die ruhige, erholsame Lage eigenen sich hervorragend für ausgedehnte Wanderungen, Rad- und Motorradtouren. "
    url: "steiger"
    url_title: "Mehr erfahren"
    images:
    - name: "Steiger und Umgebung"
      src: "/images/Steiger.jpg" 

  open_si:
    title: "Öffnungszeiten"
    text: "Montag bis Samstag ab 17 Uhr  \n Sonntag ab 11 Uhr  \n  Donnerstag Ruhetag  \n Durchgehend warme Küche"
    icon: "far fa-calendar-alt"
  heart_si:
    title: "Mit Herz dabei!"
    text: "Wir bringen für Sie die Spezialitäten des Spessarts, frisch und herzhaft zubereitet auf den Tisch."
    icon: "fas fa-heart"
  rooms_si:
    title: "Gästezimmer"
    text: "Ob Geschäftsreise oder Urlaub, Entspannung oder Erlebnis - Wir haben ein Zimmer!"
    icon: "fas fa-home"
  vacation_si:
    title: "Wir haben Urlaub"
    icon: "fas fa-mug-hot"


