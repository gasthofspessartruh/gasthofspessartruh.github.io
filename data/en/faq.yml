faq:
  - question: "How can I make a reservation?"
    answer: "Reservations can be made by phone, email, or directly through our website. We recommend booking in advance to ensure your desired date is available."
  
  - question: "Are there enough parking spaces available?"
    answer: "Yes, we offer our guests free parking right at the country inn."
  
  - question: "Are pets allowed?"
    answer: "Pets are allowed in some rooms for a small fee. Please inform us at the time of booking if you plan to arrive with a pet."
  
  - question: "Are the rooms equipped with internet access?"
    answer: "All rooms have free Wi-Fi. You will receive the access data upon arrival."
  
  - question: "Can I rent bicycles from you?"
    answer: "Yes, we offer our guests the opportunity to rent bicycles to explore the surrounding countryside."
  
  - question: "Do you offer special diets or vegetarian/vegan options?"
    answer: "Yes, our kitchen team is happy to accommodate special dietary needs. Please inform us in advance."
  
  - question: "What are the check-in and check-out times?"
    answer: "Check-in is possible from 3:00 PM, and we ask our guests to check out by 11:00 AM. If you wish for an earlier arrival or later departure, please contact us in advance."
  
  - question: "Are there activities or attractions nearby?"
    answer: "In the vicinity of our country inn, you will find numerous hiking trails, historical sites, and nature parks. We are happy to provide personal recommendations and informational material."
