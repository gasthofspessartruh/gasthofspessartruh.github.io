index:
  welcome_title: "Welcome to Landgasthof Spessartruh in Steiger"
  welcome_text: "In the heart of the Spessart forest, you will find a traditional inn with polished wooden tables, a cozy tiled stove, and hearty dishes.  \n Enjoy regional cuisine that uses the best products from our own breeding and production.  \n Our homemade sausages and ham are prepared deliciously and hearty by master butcher Georg Gerber.  \n From snacks to juicy steaks, delicious salads, and vegetarian options, the menu leaves little to be desired.  \n Perhaps you can also try a glass of homemade „Äppelwoi“ (apple wine) or enjoy a freshly tapped beer from the region."

  cards_title: "A Guesthouse to Feel at Home"
  cards:
  - title: "Our Beer Garden"
    text: "Take a seat in our spacious beer garden! \n\n Experience a unique panorama, shaded by walnut trees, and a children's playground."
    images:
    - name: "Clara, Mona, and Frida"
      src: "/images/biergarten/Mona-Clara-und-Frida.jpeg"
  - title: "Celebrations"
    text: "Whether with or without tablecloth, we are delighted to accompany your next celebration. \n\n Simply make an appointment for a discussion by phone or email."
    images:
    - name: "First Communion"
      src: "/images/feierlichkeiten/kommunion_gruen.jpeg"
    - name: "Wedding"
      src: "/images/feierlichkeiten/hochzeit.jpeg"
    - name: "Wedding"
      src: "/images/feierlichkeiten/Hochzeit-2.jpg"
  - title: "Steiger and Surroundings"
    text: "The small village of Steiger, with around 80 inhabitants, is located on an elevated plateau without through traffic. The fresh air of the Spessart region and the peaceful, relaxing location are perfect for extensive hikes, cycling, and motorbike tours."
    url: "steiger"
    url_title: "Learn more"
    images:
    - name: "Spessartweg"
      src: "/images/gallery/4.jpg"

  short_info:
  - title: "Opening Hours"
    text: "Monday to Friday from 5:00 PM  \nSaturday from 2:00 PM  \n Sunday from 11:00 AM  \n Thursday closed  \n Continuous hot food"
    icon: "far fa-calendar-alt"
  - title: "With Heart and Soul!"
    text: "We bring the specialties of the Spessart region to your table, freshly and heartily prepared."
    icon: "fas fa-heart"
  - title: "Guest Rooms"
    text: "Whether on a business trip or vacation, for relaxation or adventure - we have a room for you!"
    icon: "fas fa-home"

